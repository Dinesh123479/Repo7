apiVersion: apps/v1
kind: Deployment

metadata:
  name: cicd-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cicd

  template:
    metadata:
      labels:
        app: cicd

    spec:
      containers:
      - name: app
        image: dinu124/cicd-app
        ports:
        - containerPort: 5000